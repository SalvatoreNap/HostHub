<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostHub - Trova la tua prossima avventura</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero { background: #f8f9fa; padding: 100px 0; border-bottom: 1px solid #dee2e6; }
        .card-img-top { height: 200px; object-fit: cover; background: #eee; }
    </style>
</head>
<!-- 1. Aggiunte le classi Flexbox al body -->
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">HostHub</a>

            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'lista_alloggi' %}">Esplora</a>
                <a class="nav-link" href="{% url 'lista_esperienze' %}">Esperienze</a>

                {% if request.session.utente_id %}
                    <a class="nav-link fw-bold text-white" href="{% url 'profilo_utente' %}">Ciao, {{ request.session.utente_nome }}!</a>
                    {% if request.session.is_host %}
                      <a class="nav-link" href="{% url 'host_dashboard' %}">Host Dashboard</a>
                    {% endif %}
                    <a class="nav-link text-warning" href="{% url 'logout' %}">Esci</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">Accedi</a>
                    <a class="nav-link" href="{% url 'registrazione' %}">Registrati</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- 2. Avvolto il content in un tag main con flex-grow-1 -->
    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- 3. Sostituito mt-5 con mt-auto per spingere il footer in basso -->
    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <p>&copy; 2026 HostHub Project - Corso Basi di Dati</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Se avevi lo script di SweetAlert per i pop-up, incollalo qui sotto! -->
</body>
</html>
